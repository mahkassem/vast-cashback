<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vast Cashback — Document Viewer</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.5.1/github-markdown-dark.min.css">
<style>
  :root {
    --bg: #0f1115;
    --sidebar-bg: #161922;
    --border: #2a2f3a;
    --text: #e8eaef;
    --muted: #8a93a3;
    --accent: #4ea1ff;
    --accent-soft: #1a3a5c;
    --sidebar-w: 280px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg); color: var(--text);
    font: 15px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    display: flex; min-height: 100vh;
  }

  /* Sidebar */
  aside {
    position: fixed; top: 0; left: 0; bottom: 0;
    width: var(--sidebar-w); background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    overflow-y: auto; padding: 20px 0; z-index: 20;
    display: flex; flex-direction: column;
  }
  .sidebar-header {
    padding: 0 16px 16px; border-bottom: 1px solid var(--border); margin-bottom: 8px;
  }
  .sidebar-header a {
    color: var(--muted); text-decoration: none; font-size: 12px;
    display: flex; align-items: center; gap: 6px; margin-bottom: 10px;
  }
  .sidebar-header a:hover { color: var(--accent); }
  .sidebar-header h2 { font-size: 14px; color: var(--text); line-height: 1.3; }
  .toc { flex: 1; overflow-y: auto; padding: 8px 0; }
  .toc a {
    display: block; padding: 5px 16px; color: var(--muted);
    text-decoration: none; font-size: 13px; line-height: 1.4;
    border-left: 2px solid transparent; transition: all 0.15s;
  }
  .toc a:hover { color: var(--text); background: rgba(78,161,255,0.05); }
  .toc a.active { color: var(--accent); border-left-color: var(--accent); background: rgba(78,161,255,0.08); }
  .toc a.h1 { font-weight: 600; padding-left: 16px; }
  .toc a.h2 { padding-left: 16px; }
  .toc a.h3 { padding-left: 32px; font-size: 12px; }
  .toc a.h4 { padding-left: 48px; font-size: 12px; }

  /* File switcher */
  .file-switch {
    padding: 12px 16px; border-top: 1px solid var(--border);
  }
  .file-switch a {
    display: block; padding: 6px 10px; color: var(--muted);
    text-decoration: none; font-size: 12px; border-radius: 6px;
    transition: all 0.15s;
  }
  .file-switch a:hover { color: var(--text); background: rgba(255,255,255,0.04); }
  .file-switch a.current { color: var(--accent); background: var(--accent-soft); }

  /* Main content */
  main {
    margin-left: var(--sidebar-w); flex: 1; min-width: 0;
    padding: 40px 48px 80px; max-width: 960px;
  }
  .markdown-body {
    background: transparent !important; color: var(--text) !important;
    font-size: 15px;
  }
  .markdown-body h1,
  .markdown-body h2,
  .markdown-body h3,
  .markdown-body h4 { scroll-margin-top: 24px; }
  .markdown-body table { display: table; width: 100%; }
  .markdown-body th, .markdown-body td { border-color: var(--border); }
  .markdown-body code { background: #1a1d24; }
  .markdown-body pre { background: #0d0f13 !important; }
  .markdown-body blockquote { border-left-color: var(--accent); color: var(--muted); }
  .markdown-body a { color: var(--accent); }
  .markdown-body hr { border-color: var(--border); }

  /* Loading */
  .loading {
    display: flex; align-items: center; justify-content: center;
    height: 60vh; color: var(--muted); font-size: 14px;
  }

  /* Mobile */
  @media (max-width: 768px) {
    aside { position: relative; width: 100%; height: auto; max-height: 50vh; border-right: none; border-bottom: 1px solid var(--border); }
    body { flex-direction: column; }
    main { margin-left: 0; padding: 24px 16px 60px; }
  }
</style>
</head>
<body>

<aside>
  <div class="sidebar-header">
    <a href="index.html">&larr; Back to index</a>
    <h2 id="doc-title">Loading...</h2>
  </div>
  <nav class="toc" id="toc"></nav>
  <div class="file-switch" id="file-switch">
    <a href="viewer.html?file=cashback-db-design.md">Database Design</a>
    <a href="viewer.html?file=cashback-integration-impact.md">Integration Impact</a>
  </div>
</aside>

<main>
  <article class="markdown-body" id="content">
    <div class="loading">Loading document...</div>
  </article>
</main>

<script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
<script>
  const params = new URLSearchParams(location.search);
  const file = params.get('file') || 'cashback-db-design.md';

  // Highlight current file in switcher
  document.querySelectorAll('#file-switch a').forEach(a => {
    if (a.href.includes(file)) a.classList.add('current');
  });

  // Slug helper
  function slugify(text) {
    return text.toLowerCase().replace(/[^\w\s-]/g, '').replace(/\s+/g, '-').replace(/-+/g, '-').trim();
  }

  // Custom renderer to add IDs to headings
  const renderer = new marked.Renderer();
  const slugCounts = {};
  const origHeading = renderer.heading.bind(renderer);
  renderer.heading = function(text, level) {
    const raw = text.replace(/<[^>]*>/g, '');
    let slug = slugify(raw);
    if (slugCounts[slug] !== undefined) {
      slugCounts[slug]++;
      slug = slug + '-' + slugCounts[slug];
    } else {
      slugCounts[slug] = 0;
    }
    return `<h${level} id="${slug}">${text}</h${level}>`;
  };

  marked.setOptions({ renderer, gfm: true, breaks: false });

  fetch(file)
    .then(r => {
      if (!r.ok) throw new Error('File not found');
      return r.text();
    })
    .then(md => {
      // Render markdown
      document.getElementById('content').innerHTML = marked.parse(md);

      // Set title from first H1 or filename
      const firstH1 = document.querySelector('#content h1');
      document.getElementById('doc-title').textContent =
        firstH1 ? firstH1.textContent : file.replace('.md', '');

      // Build TOC
      const headings = document.querySelectorAll('#content h1, #content h2, #content h3, #content h4');
      const toc = document.getElementById('toc');
      headings.forEach(h => {
        const a = document.createElement('a');
        a.href = '#' + h.id;
        a.textContent = h.textContent;
        a.className = h.tagName.toLowerCase();
        toc.appendChild(a);
      });

      // Active heading tracking
      const tocLinks = toc.querySelectorAll('a');
      const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            tocLinks.forEach(l => l.classList.remove('active'));
            const active = toc.querySelector(`a[href="#${entry.target.id}"]`);
            if (active) {
              active.classList.add('active');
              active.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
            }
          }
        });
      }, { rootMargin: '-20px 0px -70% 0px', threshold: 0.1 });
      headings.forEach(h => observer.observe(h));
    })
    .catch(err => {
      document.getElementById('content').innerHTML =
        `<div class="loading">Failed to load ${file}: ${err.message}</div>`;
    });
</script>
</body>
</html>
